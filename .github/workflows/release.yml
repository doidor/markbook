name: Release

# Automatic version bumping + npm publish via Changesets, using TOKENLESS OIDC
# (npm Trusted Publishing) — no NPM_TOKEN secret required.
#
# On push to main, Changesets opens/updates a "Version Packages" PR that bumps
# the four @doidor/markbook* packages in lockstep (`fixed` group in
# .changeset/config.json) and updates each package's CHANGELOG.md. Merging that
# PR publishes them to npm via OIDC, with automatic provenance.
#
# One-time setup (see RELEASING.md):
#   1. Configure a Trusted Publisher for EACH of the four packages on npmjs.com
#      → Package → Settings → Trusted Publisher → GitHub Actions:
#      owner `doidor`, repo `markbook`, workflow `release.yml`.
#   2. Settings → Actions → General → Workflow permissions → enable
#      "Allow GitHub Actions to create and approve pull requests".
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # push the version PR branch + release tags
  pull-requests: write # open/update the "Version Packages" PR
  id-token: write # tokenless npm publish via OIDC (trusted publishing) + automatic provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # pnpm version comes from the root package.json "packageManager" field;
      # don't also pin it here (pnpm/action-setup errors on a double pin).
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing requires npm CLI >= 11.5.1; Node 20 bundles an older
      # one. pnpm publish delegates the actual upload to the npm on PATH.
      - name: Use an npm that supports trusted publishing
        run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      - name: Create Version PR or publish to npm (OIDC — no token)
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
