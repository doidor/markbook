name: Release

# Publishes the @doidor/markbook* packages to npm.
#
# Trigger: publish a GitHub Release whose tag is `v<version>` (e.g. v0.1.0).
# The tag must match the version in the package manifests (bump + commit the
# versions first, then tag/release). `workflow_dispatch` is available for a
# manual run, with an optional dry-run that packs without publishing.
#
# Auth: a classic-or-granular npm **automation** token stored as the repo
# secret `NPM_TOKEN`. Provenance attestations are emitted (`--provenance`),
# which requires this public repo + the `id-token: write` permission below.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Pack everything but do not actually publish'
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance
    steps:
      - uses: actions/checkout@v6

      # pnpm version is read from the root package.json "packageManager" field;
      # don't also pin it here (pnpm/action-setup errors on a double pin).
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify the release tag matches the package version
        if: github.event_name == 'release'
        run: |
          PKG_VERSION="$(node -p "require('./packages/cli/package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          echo "Release tag: ${GITHUB_REF_NAME} (version part: ${TAG})"
          echo "@doidor/markbook version: ${PKG_VERSION}"
          if [ "${TAG}" != "${PKG_VERSION}" ]; then
            echo "::error::Release tag v${TAG} does not match @doidor/markbook version ${PKG_VERSION}. Bump and commit the package versions before tagging."
            exit 1
          fi

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      # Built from a fresh checkout, so dist/ is always clean (no stale outputs).
      - name: Build packages
        run: pnpm build

      - name: Unit tests
        run: pnpm test

      # `pnpm -r publish` walks the workspace in dependency order, rewrites
      # `workspace:*` to the concrete version, skips private packages (root +
      # examples), and skips any version already on the registry — so re-running
      # a release is safe/idempotent.
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          EXTRA=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry-run }}" = "true" ]; then
            EXTRA="--dry-run"
            echo "Running in dry-run mode — nothing will be published."
          fi
          pnpm -r publish --access public --no-git-checks --provenance ${EXTRA}
