name: "Copilot Setup Steps"
# Generated by AgentRig. Do not edit here — edit the source and run `agentrig compile`.
# Prepares the Copilot coding agent's ephemeral environment (detected stack: Node.js).
# Customize freely — this file is yours after the first scaffold.

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be named `copilot-setup-steps` or Copilot will not pick it up.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Install dependencies
        run: corepack enable && pnpm install --frozen-lockfile
