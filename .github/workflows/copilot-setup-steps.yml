name: "Copilot Setup Steps"
# Prepares the GitHub Copilot cloud-agent's ephemeral environment so the first
# `pnpm lint` / `pnpm typecheck` / `pnpm test` / `pnpm build` in a session runs
# without bootstrap overhead.
#
# Stack (matches ci.yml + release.yml + deploy-docs.yml):
#   - TypeScript 5.6+ across a pnpm workspace (packages/* + examples/*)
#   - Node 20 (root package.json engines.node >= 20; CI uses 20)
#   - pnpm 8.15.9 — pinned via the root package.json "packageManager" field;
#     pnpm/action-setup@v6 reads that pin (don't double-pin here, the action
#     errors out — see the comment in ci.yml step "Set up pnpm")
#   - Biome 2.4.14 for lint+format, Vitest 2.1 for tests, Vite 5.4 for example
#     site builds, all installed via the same `pnpm install`
#
# No databases or external services are required: all builds/tests run
# in-process, and Pagefind ships as a regular npm dependency (not a system
# binary). Trusted Publishing / npm OIDC is only used by release.yml; the
# coding-agent environment does not publish, so no NPM_TOKEN / no `npm install
# -g npm@latest` step is needed here.
#
# Keep this file scoped to environment setup. Task commands (`pnpm build`,
# `pnpm test`, the example:* builds, `markbook` CLI invocations) should be run
# by the agent during a task, not pre-baked here.

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be named `copilot-setup-steps` or Copilot will not pick it up.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # pnpm version comes from the root package.json "packageManager" field
      # (pnpm@8.15.9). Don't also pin it here — pnpm/action-setup errors out
      # when a version is specified in both places.
      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
