name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # pnpm version comes from the root package.json "packageManager" field
      # (pnpm@8.15.9). Don't also pin it here — pnpm/action-setup errors out
      # when a version is specified in both places.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build packages
        run: pnpm build

      - name: Unit tests
        run: pnpm test

      - name: Build React demo
        run: pnpm example:build

      - name: Bundle React demo (embed)
        run: pnpm example:bundle

      - name: Build static demo (markdown-only, no adapter)
        run: pnpm example:static:build

      - name: Build marketing demo (custom layout via disableBaseCss + transformHtml)
        run: pnpm example:marketing:build

      - name: Build the Markbook site (hybrid layout — landing + default chrome)
        run: pnpm example:site:build
